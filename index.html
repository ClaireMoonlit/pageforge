      /* 全局滚动条样式：暗色细滚动条（与工具栏/侧栏/画布一致） */
      /* WebKit 浏览器（Chrome/Edge/Safari） */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.25);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
        -webkit-transition: background-color 0.15s ease;
        transition: background-color 0.15s ease;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.45); background-clip: padding-box; }
      ::-webkit-scrollbar-thumb:active { background: rgba(148, 163, 184, 0.6); background-clip: padding-box; }
      ::-webkit-scrollbar-corner { background: transparent; }
      /* Firefox */
      * { scrollbar-width: thin; scrollbar-color: rgba(148, 163, 184, 0.25) transparent; }
